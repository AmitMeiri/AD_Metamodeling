  <rect x="40" y="128" width="140" height="22" rx="11" fill="#e3f0fb" stroke="#1565c0" stroke-width="1"/>
  <text x="110" y="143" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10.5" fill="#0d3b6e">age_baseline</text>

  <rect x="40" y="158" width="140" height="22" rx="11" fill="#e3f0fb" stroke="#1565c0" stroke-width="1"/>
  <text x="110" y="173" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10.5" fill="#0d3b6e">apoe4_status</text>

