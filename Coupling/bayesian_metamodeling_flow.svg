  <text x="860" y="614" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="700" fill="#1b4d1b">Subtype</text>

  <!-- ══════════════════════════════════════
       UNDIRECTED CONNECTIONS (double-ended)
       All lines: marker-start + marker-end
  ══════════════════════════════════════ -->

  <!-- ODE: tau_self_dynamic (right=442, y=139) ↔ Tau Dynamics (left=788) -->
  <path d="M442 139 C570 139, 710 185, 788 196" fill="none" stroke="#c62828" stroke-width="1.7" marker-start="url(#startR)" marker-end="url(#endR)"/>

  <!-- ODE: tau_self_dynamic (right=442, y=139) ↔ Subtype (left=788, cy=610) -->
  <path d="M442 139 C580 139, 710 560, 788 592" fill="none" stroke="#c62828" stroke-width="1.7" stroke-dasharray="5 2.5" marker-start="url(#startR)" marker-end="url(#endR)"/>

  <!-- ODE: clinical_stage_yr5 (right=442, y=319) ↔ Disease Stage (left=788, cy=410) -->
  <path d="M442 319 C600 319, 710 385, 788 398" fill="none" stroke="#c62828" stroke-width="1.7" marker-start="url(#startR)" marker-end="url(#endR)"/>

  <!-- ODE: apoe4_status (right=180, y=169) ↔ Subtype -->
  <path d="M180 169 C310 169, 520 540, 788 600" fill="none" stroke="#1565c0" stroke-width="1.7" marker-start="url(#startB)" marker-end="url(#endB)"/>

  <!-- ODE: memory_result_yr5 (right=442, y=289) ↔ Subtype -->
  <path d="M442 289 C600 289, 720 540, 788 608" fill="none" stroke="#c62828" stroke-width="1.7" marker-start="url(#startR)" marker-end="url(#endR)"/>

  <!-- SuStaIn: Prob_subtypes (right=437, y=504) ↔ Tau Dynamics -->
  <path d="M437 504 C580 504, 710 290, 788 228" fill="none" stroke="#c62828" stroke-width="1.7" marker-start="url(#startR)" marker-end="url(#endR)"/>

  <!-- SuStaIn: Prob_subtypes (right=437, y=504) ↔ Disease Stage -->
  <path d="M437 504 C580 504, 710 430, 788 418" fill="none" stroke="#c62828" stroke-width="1.7" marker-start="url(#startR)" marker-end="url(#endR)"/>

  <!-- SuStaIn: Prob_subtypes (right=437, y=504) ↔ Subtype -->
  <path d="M437 504 C580 504, 710 580, 788 598" fill="none" stroke="#c62828" stroke-width="1.7" marker-start="url(#startR)" marker-end="url(#endR)"/>

  <!-- SuStaIn: Expected_stage (right=437, y=624) ↔ Disease Stage -->
  <path d="M437 624 C600 624, 720 490, 788 430" fill="none" stroke="#c62828" stroke-width="1.7" marker-start="url(#startR)" marker-end="url(#endR)"/>

  <!-- ══════════════════════════════════════
       LEGEND
  ══════════════════════════════════════ -->
  <rect x="30" y="726" width="680" height="34" rx="8" fill="#fffde7" stroke="#c8b400" stroke-width="1"/>
  <rect x="46" y="736" width="52" height="14" rx="7" fill="#e3f0fb" stroke="#1565c0" stroke-width="1"/>
  <text x="104" y="747" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#0d3b6e">Input variable</text>

  <rect x="200" y="736" width="52" height="14" rx="7" fill="#fdecea" stroke="#c62828" stroke-width="1"/>
  <text x="258" y="747" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#7b1a1a">Output variable</text>

  <circle cx="370" cy="743" r="7" fill="#c8f0c8" stroke="#2e7d32" stroke-width="1.2"/>
  <text x="383" y="747" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#1b4d1b">Coupling node</text>

  <line x1="470" y1="743" x2="516" y2="743" stroke="#c62828" stroke-width="1.8" marker-start="url(#startR)" marker-end="url(#endR)"/>
  <text x="522" y="747" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#7b1a1a">Coupling connection</text>

  <line x1="618" y1="743" x2="664" y2="743" stroke="#1565c0" stroke-width="1.8" stroke-dasharray="5 2.5" marker-start="url(#startB)" marker-end="url(#endB)"/>
  <text x="670" y="747" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#0d3b6e">Cross-cluster link</text>
</svg>
