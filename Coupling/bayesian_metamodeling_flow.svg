  <text x="245" y="424" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="700" fill="#5a4200">Vogel SuStaIn</text>

  <!-- Section labels -->
  <text x="95" y="456" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="600" fill="#1565c0" letter-spacing="0.5">INPUTS</text>
  <text x="355" y="456" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="600" fill="#c62828" letter-spacing="0.5">OUTPUTS</text>
  <line x1="240" y1="444" x2="240" y2="672" stroke="#e0cc60" stroke-width="1" opacity="0.6" stroke-dasharray="4 3"/>

