  <text x="347" y="143" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10.5" fill="#7b1a1a">tau_self_dynamic</text>

  <rect x="252" y="158" width="190" height="22" rx="11" fill="#fdecea" stroke="#c62828" stroke-width="1"/>
  <text x="347" y="173" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10.5" fill="#7b1a1a">amyloid_self_dynamic</text>

  <rect x="252" y="188" width="190" height="22" rx="11" fill="#fdecea" stroke="#c62828" stroke-width="1"/>
  <text x="347" y="203" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10.5" fill="#7b1a1a">amyloid_drive_tau</text>

  <rect x="252" y="218" width="190" height="22" rx="11" fill="#fdecea" stroke="#c62828" stroke-width="1"/>
  <text x="347" y="233" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10.5" fill="#7b1a1a">memory_result_baseline</text>

