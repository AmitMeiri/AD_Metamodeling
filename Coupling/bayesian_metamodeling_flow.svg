  <rect x="30" y="62" width="430" height="38" rx="14" fill="#fff9c4" stroke="#b8a000" stroke-width="1.5"/>
  <rect x="30" y="85" width="430" height="15" fill="#fff9c4"/>
  <text x="245" y="86" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="700" fill="#5a4200">Bossa &amp; Sahli ODE 2023</text>

  <!-- Section labels -->
  <text x="95" y="118" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="600" fill="#1565c0" letter-spacing="0.5">INPUTS</text>
  <text x="355" y="118" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="600" fill="#c62828" letter-spacing="0.5">OUTPUTS</text>
  <line x1="240" y1="106" x2="240" y2="363" stroke="#e0cc60" stroke-width="1" opacity="0.6" stroke-dasharray="4 3"/>

