  <text x="115" y="628" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10.5" fill="#0d3b6e">Region_5_zscore</text>

  <rect x="40" y="643" width="150" height="22" rx="11" fill="#e3f0fb" stroke="#1565c0" stroke-width="1"/>
  <text x="115" y="658" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10.5" fill="#0d3b6e">Region_6_zscore</text>

