  <text x="347" y="293" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10.5" fill="#7b1a1a">memory_result_yr5</text>

  <rect x="252" y="308" width="190" height="22" rx="11" fill="#fdecea" stroke="#c62828" stroke-width="1"/>
  <text x="347" y="323" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10.5" fill="#7b1a1a">clinical_stage_yr5</text>

